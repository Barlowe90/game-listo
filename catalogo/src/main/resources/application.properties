# =====================================
# CONFIGURACION - CATALOGO SERVICE
# =====================================
spring.application.name=catalogo
server.port=8082
# =====================================
# POSTGRESQL DATASOURCE
# =====================================
spring.datasource.url=jdbc:postgresql://localhost:5432/catalogo_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:}
spring.datasource.password=${POSTGRES_PASSWORD:}
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
# lo quito que es una locura cuando hago sync/games
spring.jpa.show-sql=false 
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# =====================================
# MONGODB CONFIGURATION
# =====================================
spring.mongodb.host=mongo
spring.mongodb.port=27017
spring.mongodb.username=${MONGO_USER}
spring.mongodb.password=${MONGO_PASSWORD}
spring.mongodb.database=catalogo_db
spring.mongodb.authentication-database=admin
# =====================================
# RABBITMQ
# =====================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:guest}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:guest}
# =====================================
# IGDB API CONFIGURATION
# =====================================
# Obtener credenciales en: https://dev.twitch.tv/console/apps
igdb.client-id=${IGDB_CLIENT_ID:your-client-id-here}
igdb.access-token=${IGDB_ACCESS_TOKEN:your-access-token-here}
igdb.base-url=https://api.igdb.com/v4
igdb.timeout=30000
# Batch size reducido para evitar buffer overflow (la API IGDB devuelve muchos datos por juego)
igdb.batch-size=100
# Max buffer size in bytes that WebClient should store in memory (16 MB)
igdb.max-response-buffer-size=16777216
# =====================================
# SPRINGDOC OPENAPI / SWAGGER CONFIGURATION
# =====================================
# Swagger UI path: http://localhost:8082/swagger-ui/index.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
# API Docs paths
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
# Ordenar endpoints alfabeticamente
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
# Habilitar try-it-out por defecto
springdoc.swagger-ui.tryItOutEnabled=true
# Mostrar request duration
springdoc.swagger-ui.displayRequestDuration=true
# Paths a escanear
springdoc.packages-to-scan=com.gamelist.catalogo_service.infrastructure.api.rest
springdoc.paths-to-match=/v1/**