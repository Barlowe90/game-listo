# =====================================
# CONFIGURACION DOCKER - USUARIOS SERVICE
# =====================================
spring.application.name=usuarios
server.port=8081
# Frontend URL
app.frontend.url=${FRONTEND_URL:http://localhost:8080}
# =====================================
# JWT CONFIGURATION
# =====================================
# Clave secreta para firmar JWT (DEBE ser identica en gateway)
jwt.secret=${JWT_SECRET}
# Access token expiration: 24 horas (en milisegundos)
jwt.expiration-ms=86400000
# Refresh token expiration: 7 dias (en milisegundos)
jwt.refresh-expiration-ms=604800000
# =====================================
# REDIS CONFIGURATION
# =====================================
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
# =====================================
# POSTGRESQL DATASOURCE
# =====================================
spring.datasource.url=jdbc:postgresql://postgres:5432/usuarios_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# =====================================
# RABBITMQ (DOCKER)
# =====================================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
# =====================================
# RESEND EMAIL CONFIGURATION
# =====================================
# API Key de Resend (obtener desde: https://resend.com/api-keys)
resend.api-key=${RESEND_API_KEY}
# Email remitente (debe estar verificado en Resend)
resend.from-email=${RESEND_FROM_EMAIL:GameListo <no-reply@mail.gamelisto.top>}
# =====================================
# LOGGING
# =====================================
logging.level.org.springframework.web=INFO
logging.level.com.gamelisto.usuarios=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
