# =====================================
# CONFIGURACION - USUARIOS SERVICE
# =====================================
spring.application.name=usuarios
server.port=8081
# Frontend URL
app.frontend.url=${FRONTEND_URL:http://localhost:8080}
# =====================================
# JWT CONFIGURATION
# =====================================
# Clave secreta para firmar JWT (DEBE ser identica en gateway)
jwt.secret=${JWT_SECRET:gAx9yPGr6SDyw7pKJoBa4IepYznutUkBxzE99c34FXD}
# Access token expiration: 24 horas (en milisegundos)
jwt.expiration-ms=86400000
# Refresh token expiration: 7 dias (en milisegundos)
jwt.refresh-expiration-ms=604800000
# =====================================
# REDIS CONFIGURATION
# =====================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
# =====================================
# POSTGRESQL DATASOURCE
# =====================================
spring.datasource.url=jdbc:postgresql://localhost:5432/usuarios_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:gamelisto_user}
spring.datasource.password=${POSTGRES_PASSWORD:Df1ZY0WVSzNFGyxQ2ROzU36E6BuEt9vB}
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# =====================================
# RABBITMQ
# =====================================
messaging.rabbitmq.enabled=true
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:guest}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:guest}
# =====================================
# RESEND EMAIL CONFIGURATION
# =====================================
# API Key de Resend (obtener desde: https://resend.com/api-keys)
resend.api-key=${RESEND_API_KEY:}
# Email remitente (debe estar verificado en Resend)
resend.from-email=${RESEND_FROM_EMAIL:GameListo <no-reply@mail.gamelisto.top>}
