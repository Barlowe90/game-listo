# ============================================
# CONFIGURACION DE TESTS - USUARIOS
# ============================================
spring.application.name=usuarios-test
server.port=0
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# Redis - Docker Compose service
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
# RabbitMQ - Completamente deshabilitado para tests
messaging.rabbitmq.enabled=false
spring.rabbitmq.listener.simple.auto-startup=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
# Mock para IUsuarioPublisher y IEmailService (evitar errores de dependencias)
spring.main.allow-bean-definition-overriding=true
# JWT Configuration (debe coincidir con el secret del gateway)
jwt.secret=${JWT_SECRET:tu-secreto-super-seguro-cambialo-en-produccion-debe-ser-muy-largo}
jwt.expiration=900000
jwt.refresh-expiration=604800000
# Resend Email Service - Configuracion de test
resend.api-key=${RESEND_API_KEY:re_test_api_key}
resend.from-email=noreply@gamelisto.com
app.frontend.url=https://gamelisto.com
# Spring MVC configuration for tests
spring.web.resources.add-mappings=false
spring.mvc.pathmatch.matching-strategy=path_pattern_parser
# Logging
logging.level.com.gamelisto=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.data.redis=DEBUG

