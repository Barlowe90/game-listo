# Test Configuration - PostgreSQL with Testcontainers
# Application
spring.application.name=usuarios-service-test
server.port=0
# PostgreSQL with Testcontainers
# DataSource configurado autom·ticamente por @ServiceConnection en TestContainersConfig
# NO configurar spring.datasource.url manualmente, Testcontainers lo inyecta
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# RabbitMQ - Completamente deshabilitado para tests
messaging.rabbitmq.enabled=false
spring.rabbitmq.listener.simple.auto-startup=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
# Spring MVC configuration for tests
spring.web.resources.add-mappings=false
spring.mvc.pathmatch.matching-strategy=path_pattern_parser
# Logging
logging.level.com.gamelisto=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.testcontainers=INFO
logging.level.com.github.dockerjava=WARN
logging.level.tc.postgres=INFO
