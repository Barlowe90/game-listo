# Test Configuration - H2 In-Memory Database

# Application
spring.application.name=usuarios-service-test
server.port=0

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
jakarta.persistence.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console (disabled for tests)
spring.h2.console.enabled=false

# RabbitMQ (disabled for integration tests - no se debe configurar spring.rabbitmq.*)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
# NO configurar spring.rabbitmq.host ni spring.rabbitmq.port ni spring.rabbitmq.addresses
# para que @ConditionalOnProperty en RabbitMQConfig no active la configuración

# Messaging disabled in tests
messaging.rabbitmq.enabled=false

# Spring MVC configuration for tests
# Deshabilitar manejo de recursos estáticos para que los controllers tengan prioridad
spring.web.resources.add-mappings=false
# Habilitar PathPattern matching (mejor performance y más robusto en Spring 6+)
spring.mvc.pathmatch.matching-strategy=path_pattern_parser

# Logging para debugging
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=TRACE

# JWT (test secret)
jwt.secret=test-secret-key-for-jwt-integration-tests-minimum-32-chars
jwt.expiration=86400000
jwt.issuer=gamelisto-test

# Logging
logging.level.com.gamelisto=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
