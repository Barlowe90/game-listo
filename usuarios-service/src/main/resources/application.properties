# Aplicacion
spring.application.name=usuarios-service
server.port=8081

# RabbitMQ
spring.rabbitmq.addresses=amqp://guest:guest@rabbitmq:5672

# Embedded H2 datasource for local development
spring.datasource.url=jdbc:postgresql://localhost:5432/usuarios_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=guest
spring.datasource.password=guest

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Discord OAuth2
# Obtener estos valores desde: https://discord.com/developers/applications
discord.client-id=${DISCORD_CLIENT_ID:1449451802423459891}
discord.client-secret=${DISCORD_CLIENT_SECRET:your_client_secret_here}
