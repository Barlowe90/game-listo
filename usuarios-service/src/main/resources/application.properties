# Aplicacion
spring.application.name=usuarios-service
server.port=8081

# RabbitMQ
spring.rabbitmq.addresses=amqp://guest:guest@rabbitmq:5672

# Embedded H2 datasource for local development
spring.datasource.url=jdbc:postgresql://localhost:5432/usuarios_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=guest
spring.datasource.password=guest

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =====================================
# DISCORD OAUTH2 CONFIGURATION
# =====================================
# Obtener estos valores desde: https://discord.com/developers/applications

# Credenciales de la aplicación Discord
discord.client-id=${DISCORD_CLIENT_ID:1449451802423459891}
discord.client-secret=${DISCORD_CLIENT_SECRET:your_client_secret_here}

# URLs de OAuth2
discord.authorization-url=https://discord.com/oauth2/authorize
discord.token-url=https://discord.com/api/v10/oauth2/token
discord.user-info-url=https://discord.com/api/v10/users/@me

# Redirect URIs (configurar también en Discord Developer Portal)
discord.redirect-uri.development=${DISCORD_REDIRECT_URI_DEV:http://localhost:3000/discord/callback}
discord.redirect-uri.production=${DISCORD_REDIRECT_URI_PROD:https://gamelisto.com/discord/callback}

# Scopes requeridos
discord.scopes=identify

# Configuración adicional
discord.prompt=consent
# =====================================
# SPRINGDOC OPENAPI / SWAGGER CONFIGURATION
# =====================================
# Swagger UI path: http://localhost:8081/swagger-ui/index.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# API Docs paths
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true

# Ordenar endpoints alfabéticamente
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# Habilitar try-it-out por defecto
springdoc.swagger-ui.tryItOutEnabled=true

# Mostrar request duration
springdoc.swagger-ui.displayRequestDuration=true

# Paths a escanear
springdoc.packages-to-scan=com.gamelisto.usuarios_service.infrastructure.api.rest
springdoc.paths-to-match=/v1/**