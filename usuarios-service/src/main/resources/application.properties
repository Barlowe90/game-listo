# =====================================
# CONFIGURACION - USUARIOS SERVICE
# =====================================
spring.application.name=usuarios-service
server.port=8081
# Frontend URL
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
# =====================================
# JWT CONFIGURATION
# =====================================
# Clave secreta para firmar JWT (DEBE ser identica en api-gateway)
jwt.secret=${JWT_SECRET}
# Access token expiration: 15 minutos (en milisegundos)
jwt.expiration-ms=900000
# Refresh token expiration: 7 dias (en milisegundos)
jwt.refresh-expiration-ms=604800000
# =====================================
# REDIS CONFIGURATION
# =====================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
# =====================================
# POSTGRESQL DATASOURCE
# =====================================
spring.datasource.url=jdbc:postgresql://localhost:5432/usuarios_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# =====================================
# RABBITMQ
# =====================================
messaging.rabbitmq.enabled=true
spring.rabbitmq.addresses=amqp://guest:guest@rabbitmq:5672
# =====================================
# RESEND EMAIL CONFIGURATION
# =====================================
# API Key de Resend (obtener desde: https://resend.com/api-keys)
resend.api-key=${RESEND_API_KEY:re_6JUxekzS_BL5PzQdQKfi728KQPBqAki2N}
# Email remitente (debe estar verificado en Resend)
resend.from-email=${RESEND_FROM_EMAIL:GameListo <onboarding@resend.dev>}
# =====================================
# SPRINGDOC OPENAPI / SWAGGER CONFIGURATION
# =====================================
# Swagger UI path: http://localhost:8081/swagger-ui/index.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
# API Docs paths
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
# Ordenar endpoints alfabeticamente
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
# Habilitar try-it-out por defecto
springdoc.swagger-ui.tryItOutEnabled=true
# Mostrar request duration
springdoc.swagger-ui.displayRequestDuration=true
# Paths a escanear
springdoc.packages-to-scan=com.gamelisto.usuarios_service.infrastructure.api.rest
springdoc.paths-to-match=/v1/**
