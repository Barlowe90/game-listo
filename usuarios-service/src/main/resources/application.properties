spring.application.name=usuarios-service

# Embedded H2 datasource for local development
spring.datasource.url=jdbc:h2:mem:usuariosdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Discord OAuth2
# Obtener estos valores desde: https://discord.com/developers/applications
discord.client-id=${DISCORD_CLIENT_ID:1449451802423459891}
discord.client-secret=${DISCORD_CLIENT_SECRET:your_client_secret_here}
