# =====================================
# CONFIGURACION - SOCIAL SERVICE
# =====================================
spring.application.name=Social
server.port=8086
# =====================================
# NEO4J CONFIGURATION
# =====================================
spring.neo4j.uri=bolt://neo4j:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=password
# =====================================
# RABBITMQ (desactivado en local, activado en Docker)
# =====================================
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:guest}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:guest}
messaging.rabbitmq.enabled=false
# =====================================
# ACTUATOR
# =====================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
