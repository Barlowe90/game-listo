# =====================================
# CONFIGURACION - BIBLIOTECA SERVICE
# =====================================
spring.application.name=biblioteca
server.port=8083
# Frontend URL
app.frontend.url=${FRONTEND_URL:http://localhost:8080}
# =====================================
# POSTGRESQL DATASOURCE
# =====================================
spring.datasource.url=jdbc:postgresql://localhost:5432/biblioteca_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:gamelisto_user}
spring.datasource.password=${POSTGRES_PASSWORD:Df1ZY0WVSzNFGyxQ2ROzU36E6BuEt9vB}
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# =====================================
# RABBITMQ
# =====================================
messaging.rabbitmq.enabled=true
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:guest}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:guest}
