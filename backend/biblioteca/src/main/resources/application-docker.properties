# =====================================
# CONFIGURACION DOCKER - BIBLIOTECA SERVICE
# =====================================
spring.application.name=biblioteca
server.port=8083
# Frontend URL
app.frontend.url=${FRONTEND_URL}
# =====================================
# POSTGRESQL DATASOURCE
# =====================================
spring.datasource.url=jdbc:postgresql://postgres:5432/biblioteca_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# =====================================
# RABBITMQ (DOCKER)
# =====================================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD}
services.catalogo.uri=${SERVICES_CATALOGO_URI:http://catalogo:8082}
steam.api.base-url=${STEAM_API_BASE_URL:https://api.steampowered.com}
steam.api.key=${STEAM_API_KEY:}
