# =====================================
# TEST CONFIGURATION - BIBLIOTECA SERVICE
# =====================================
spring.application.name=biblioteca-test
server.port=0
# =====================================
# POSTGRESQL (Testcontainers via @ServiceConnection)
# =====================================
spring.datasource.url=jdbc:postgresql://localhost:5432/biblioteca_db
spring.datasource.username=guest
spring.datasource.password=guest
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# =====================================
# GENERAL TEST SETTINGS
# =====================================
messaging.rabbitmq.enabled=false
# Spring MVC configuration for tests
spring.web.resources.add-mappings=false
spring.mvc.pathmatch.matching-strategy=path_pattern_parser
# Logging
logging.level.com.gamelisto=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.data.redis=DEBUG