# ============================================
# API GATEWAY - SPRING CLOUD GATEWAY (LOCAL)
# ============================================
spring.application.name=gateway
server.port=8080
# ============================================
# CONFIGURACION JWT (debe coincidir con usuarios)
# ============================================
jwt.secret=${JWT_SECRET}
# Access token expiration: 24 horas (en milisegundos)
jwt.expiration=86400000
jwt.refresh-expiration=604800000
# ============================================
# CONFIGURACION REDIS (rate limiting + token revocation)
# ============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
# ============================================
# ROUTES
# ============================================
services.usuarios.uri=http://localhost:8081
services.catalogo.uri=http://localhost:8082
services.biblioteca.uri=http://localhost:8083
services.publicaciones.uri=http://localhost:8084
services.busquedas.uri=http://localhost:8085
services.social.uri=http://localhost:8086
services.graphql.uri=http://localhost:8087
# ============================================
# ROUTES
# ============================================
spring.cloud.gateway.server.webflux.routes[0].id=usuarios-public
spring.cloud.gateway.server.webflux.routes[0].uri=${services.usuarios.uri}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/v1/usuarios/auth/register,/v1/usuarios/auth/login,/v1/usuarios/auth/refresh,/v1/usuarios/auth/verify-email,/v1/usuarios/auth/resend-verification,/v1/usuarios/auth/forgot-password,/v1/usuarios/auth/reset-password
spring.cloud.gateway.server.webflux.routes[0].predicates[1]=Method=POST,GET,OPTIONS
# ============================================
spring.cloud.gateway.server.webflux.routes[1].id=usuarios-protected
spring.cloud.gateway.server.webflux.routes[1].uri=${services.usuarios.uri}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/v1/usuarios/**
# ============================================
spring.cloud.gateway.server.webflux.routes[2].id=catalogo-public
spring.cloud.gateway.server.webflux.routes[2].uri=${services.catalogo.uri}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/v1/catalogo/**
spring.cloud.gateway.server.webflux.routes[2].predicates[1]=Method=GET,POST,PUT,DELETE,PATCH,OPTIONS
# ============================================
spring.cloud.gateway.server.webflux.routes[3].id=biblioteca
spring.cloud.gateway.server.webflux.routes[3].uri=${services.biblioteca.uri}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/v1/biblioteca/**
spring.cloud.gateway.server.webflux.routes[3].predicates[1]=Method=GET,POST,PUT,PATCH,DELETE,OPTIONS
# ============================================
spring.cloud.gateway.server.webflux.routes[4].id=publicaciones
spring.cloud.gateway.server.webflux.routes[4].uri=${services.publicaciones.uri}
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/v1/publicaciones/**
spring.cloud.gateway.server.webflux.routes[4].predicates[1]=Method=GET,POST,PUT,PATCH,DELETE,OPTIONS
# ============================================
spring.cloud.gateway.server.webflux.routes[5].id=busquedas
spring.cloud.gateway.server.webflux.routes[5].uri=${services.busquedas.uri}
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/v1/busquedas/**
spring.cloud.gateway.server.webflux.routes[5].predicates[1]=Method=GET,POST,OPTIONS
# ============================================
spring.cloud.gateway.server.webflux.routes[6].id=social
spring.cloud.gateway.server.webflux.routes[6].uri=${services.social.uri}
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/v1/social/**
spring.cloud.gateway.server.webflux.routes[6].predicates[1]=Method=GET,POST,DELETE,OPTIONS
# ============================================
spring.cloud.gateway.server.webflux.routes[7].id=graphql
spring.cloud.gateway.server.webflux.routes[7].uri=${services.graphql.uri}
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/graphql
spring.cloud.gateway.server.webflux.routes[7].predicates[1]=Method=POST,OPTIONS
# ============================================
# CONFIGURACION CORS
# ============================================
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedOrigins=http://localhost:3000,http://localhost:5173
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowCredentials=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].maxAge=3600
# ============================================
# ACTUATOR
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=INFO
logging.level.com.gamelisto.gateway=DEBUG