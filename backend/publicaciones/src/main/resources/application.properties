# =====================================
# CONFIGURACION - PUBLICACIONES SERVICE
# =====================================
spring.application.name=publicaciones
server.port=8084
# =====================================
# MONGODB CONFIGURATION
# =====================================
spring.mongodb.host=mongo
spring.mongodb.port=27017
spring.mongodb.username=${MONGO_USER}
spring.mongodb.password=${MONGO_PASSWORD}
spring.mongodb.database=publicaciones_db
spring.mongodb.authentication-database=admin
spring.mongodb.representation.uuid=standard
# =====================================
# RABBITMQ
# =====================================
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:guest}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:guest}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true