# =====================================
# TEST CONFIGURATION - CATALOGO SERVICE
# =====================================
spring.application.name=catalogo-test
server.port=0
# =====================================
# DATABASE - TESTCONTAINERS (PostgreSQL & MongoDB)
# =====================================
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# =====================================
# AUTOCONFIGURATION EXCLUSIONS
# =====================================
# Lista en una sola linea para evitar problemas de parser
# Removed RabbitAutoConfiguration exclusion to enable AMQP autoconfig during tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
# =====================================
# RABBITMQ - HABILITADO PARA TESTS
# =====================================
messaging.rabbitmq.enabled=true
spring.rabbitmq.listener.simple.auto-startup=false
# =====================================
# GENERAL TEST SETTINGS
# =====================================
spring.main.allow-bean-definition-overriding=true
spring.web.resources.add-mappings=false
spring.mvc.pathmatch.matching-strategy=path_pattern_parser
# =====================================
# LOGGING
# =====================================
ogging.level.com.gamelisto=DEBUG
logging.level.org.springframework.security=DEBUG
# Evitar que Hibernate imprima sentencias SQL durante tests
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.data.redis=DEBUG
