name: CI - GameListo v1

on:
  push:
    paths:
      - "usuarios-service/**"
    branches: [main]
  pull_request:
    paths:
      - "usuarios-service/**"
      - "deployment/**" # cambiar?
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: usuarios-service - tests
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: usuarios-service

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: guest
          POSTGRES_PASSWORD: guest
          POSTGRES_DB: usuarios_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U guest -d usuarios_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps: # esto es lo que ejecutará actions
      - name: Checkout code # esto lo tiene antonio en su CI
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: maven

      - name: Give execute permission to mvnw
        run: chmod +x mvnw

      # Auto-formateo con Spotless + commit/push a la rama del PR.
      # OJO: en PRs desde forks, GitHub no permite pushear con GITHUB_TOKEN (solo lectura).
      - name: Spotless apply (and push if it changed files)
        id: spotless
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        env:
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          cd usuarios-service
          ./mvnw -B -ntp spotless:apply
          cd ..

          if git diff --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add usuarios-service
          git commit -m "style: apply spotless formatting"
          git push origin "HEAD:${PR_BRANCH}"

          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # Si Spotless ha pusheado cambios, este run ya no es el “bueno”:
      # se disparará otro run sobre el nuevo commit.
      - name: Stop early (a formatting commit was pushed)
        if: steps.spotless.outputs.pushed == 'true'
        run: echo "Spotless changes pushed. A new CI run will start for the new commit."

      # En PR ejecutamos sobre el merge-ref (lo que realmente se mergearía a main)
      - name: Checkout merge ref (PR) for accurate tests
        if: github.event_name == 'pull_request' && steps.spotless.outputs.pushed != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Run tests (mvn verify)
        if: github.event_name != 'pull_request' || steps.spotless.outputs.pushed != 'true'
        working-directory: usuarios-service
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/usuarios_db
          SPRING_DATASOURCE_USERNAME: guest
          SPRING_DATASOURCE_PASSWORD: guest
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: "5672"
          SPRING_RABBITMQ_USERNAME: guest
          SPRING_RABBITMQ_PASSWORD: guest
        run: ./mvnw -B -ntp verify

      - name: Generate JaCoCo report
        if: github.event_name != 'pull_request' || steps.spotless.outputs.pushed != 'true'
        working-directory: usuarios-service
        run: ./mvnw -B -ntp jacoco:report

      - name: Upload test artifacts
        if: always() && (github.event_name != 'pull_request' || steps.spotless.outputs.pushed != 'true')
        uses: actions/upload-artifact@v4
        with:
          name: usuarios-service-test-artifacts
          path: |
            usuarios-service/target/surefire-reports/
            usuarios-service/target/failsafe-reports/
            usuarios-service/target/site/jacoco/
          retention-days: 7
