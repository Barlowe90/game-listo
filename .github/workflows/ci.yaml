  ci-publicaciones:
    name: publicaciones - tests
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.publicaciones == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: publicaciones

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: guest
          POSTGRES_PASSWORD: guest
          POSTGRES_DB: publicaciones_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U guest -d publicaciones_db"
          --health-interval=10s
