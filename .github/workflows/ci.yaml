      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: maven

      - name: Give execute permission to mvnw
        run: chmod +x mvnw

      - name: Run tests (mvn verify)
        run: ./mvnw -B -ntp verify

      - name: Upload test artifacts
        if: always()
