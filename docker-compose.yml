version: '3.9'

services:
  # pasarela:
  #   build:
  #     context: ./pasarela-zuul
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8090:8090"
  #   environment:
  #     PROYECTO-ESPACIOS: http://proyecto-espacios:8080
  #     PROYECTO-EVENTOS: http://proyecto-eventos:8081
  #     PROYECTO-RESERVAS: http://proyecto-reservas:8082
  #   depends_on:
  #     - proyecto-espacios
  #     - proyecto-eventos
  #     - proyecto-reservas

  usuarios-service:
    build:
      context: ./usuarios-service
      dockerfile: Dockerfile
    container_name: usuarios-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/usuarios_db
      SPRING_DATASOURCE_USERNAME: guest
      SPRING_DATASOURCE_PASSWORD: guest
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  postgres:
    image: postgres:16
    container_name: postgres_usuarios
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: guest
      POSTGRES_PASSWORD: guest
      POSTGRES_DB: usuarios_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guest -d usuarios_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

volumes:
  postgres-data:
  
networks:
  backend:
    driver: bridge