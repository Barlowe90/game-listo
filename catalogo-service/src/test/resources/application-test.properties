# =====================================
# TEST CONFIGURATION - CATALOGO SERVICE
# =====================================
spring.application.name=catalogo-service-test
server.port=0
# =====================================
# DATABASE - TESTCONTAINERS (PostgreSQL & MongoDB)
# =====================================
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# =====================================
# AUTOCONFIGURATION EXCLUSIONS
# =====================================
# Lista en una sola linea para evitar problemas de parser
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
# =====================================
# RABBITMQ - DESHABILITADO PARA TESTS
# =====================================
messaging.rabbitmq.enabled=false
spring.rabbitmq.listener.simple.auto-startup=false
# =====================================
# GENERAL TEST SETTINGS
# =====================================
spring.main.allow-bean-definition-overriding=true
spring.web.resources.add-mappings=false
spring.mvc.pathmatch.matching-strategy=path_pattern_parser
# =====================================
# LOGGING
# =====================================
logging.level.com.gamelist=DEBUG
# Evitar que Hibernate imprima sentencias SQL durante tests
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.test=INFO
