# =====================================
# CONFIGURACION - CATALOGO SERVICE (DOCKER)
# =====================================
spring.application.name=catalogo-service
server.port=8082
# =====================================
# POSTGRESQL DATASOURCE (DOCKER)
# =====================================
spring.datasource.url=jdbc:postgresql://postgres:5432/catalogo_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# =====================================
# MONGODB CONFIGURATION (DOCKER)
# =====================================
# MongoDB URI with authentication against admin and specific database for platform
spring.data.mongodb.uri=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/catalogo_db?authSource=admin
# =====================================
# RABBITMQ (DOCKER)
# =====================================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD}
# =====================================
# IGDB API CONFIGURATION
# =====================================
igdb.client-id=${IGDB_CLIENT_ID}
igdb.access-token=${IGDB_ACCESS_TOKEN}
igdb.base-url=https://api.igdb.com/v4
igdb.timeout=30000
# Batch size reducido para evitar buffer overflow (la API IGDB devuelve muchos datos por juego)
igdb.batch-size=100
# Max buffer size in bytes that WebClient should store in memory (16 MB)
igdb.max-response-buffer-size=16777216
# =====================================
# SPRINGDOC OPENAPI / SWAGGER CONFIGURATION
# =====================================
# Swagger UI path: http://localhost:8081/swagger-ui/index.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
# API Docs paths
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
# Sort endpoints alphabetically
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
# Enable try-it-out by default
springdoc.swagger-ui.tryItOutEnabled=true
# Show request duration
springdoc.swagger-ui.displayRequestDuration=true
# Paths to scan
springdoc.packages-to-scan=com.gamelist.catalogo_service.infrastructure.api.rest
springdoc.paths-to-match=/v1/**
# =====================================
# LOGGING
# =====================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.gamelist.catalogo=INFO
# Evitar que Hibernate imprima las sentencias SQL y los valores bind en la salida
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
