# =====================================
# CONFIGURACION - CATALOGO SERVICE
# =====================================
spring.application.name=catalogo-service
server.port=8082
# =====================================
# POSTGRESQL DATASOURCE
# =====================================
spring.datasource.url=jdbc:postgresql://localhost:5432/catalogo_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:}
spring.datasource.password=${POSTGRES_PASSWORD:}
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# =====================================
# MONGODB CONFIGURATION
# =====================================
spring.mongodb.uri=mongodb://${MONGO_USER:}:${MONGO_PASSWORD:}@${MONGO_HOST:}:${MONGO_PORT:}/catalogo_db?authSource=admin
# =====================================
# RABBITMQ
# =====================================
spring.rabbitmq.host=${RABBITMQ_HOST:}
spring.rabbitmq.port=${RABBITMQ_PORT:}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:}
# =====================================
# SPRINGDOC OPENAPI / SWAGGER CONFIGURATION
# =====================================
# Swagger UI path: http://localhost:8082/swagger-ui/index.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
# API Docs paths
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
# Ordenar endpoints alfabeticamente
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
# Habilitar try-it-out por defecto
springdoc.swagger-ui.tryItOutEnabled=true
# Mostrar request duration
springdoc.swagger-ui.displayRequestDuration=true
# Paths a escanear
springdoc.packages-to-scan=com.gamelist.catalogo_service.infrastructure.api.rest
springdoc.paths-to-match=/v1/**