# =====================================
# TEST CONFIGURATION - PUBLICACIONES SERVICE
# =====================================
spring.application.name=publicaciones-test
server.port=0
# =====================================
# MONGODB (Testcontainers via @ServiceConnection)
# =====================================
spring.mongodb.representation.uuid=standard
spring.data.mongodb.auto-index-creation=true
# =====================================
# AUTOCONFIGURATION EXCLUSIONS (KISS)
# - Deshabilitamos Rabbit y Security para que el contexto de tests sea estable
# - Deshabilitamos JPA/DataSource (publicaciones persiste en Mongo)
# =====================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
# =====================================
# RABBITMQ - DESHABILITADO PARA TESTS
# =====================================
messaging.rabbitmq.enabled=false
spring.rabbitmq.listener.simple.auto-startup=false
# =====================================
# GENERAL TEST SETTINGS
# =====================================
spring.main.allow-bean-definition-overriding=true
spring.web.resources.add-mappings=false
spring.mvc.pathmatch.matching-strategy=path_pattern_parser
# =====================================
# LOGGING
# =====================================
logging.level.com.gamelisto=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.test=INFO
