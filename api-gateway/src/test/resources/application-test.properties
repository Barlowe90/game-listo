# ============================================
# CONFIGURACION DE TESTS - API GATEWAY
# ============================================
spring.application.name=api-gateway-test
server.port=0
# ============================================
# JWT (valores dummy para tests)
# ============================================
jwt.secret=test-secret-key-for-testing-purposes-must-be-long-enough-for-hs256-algorithm
jwt.expiration=900000
jwt.refresh-expiration=604800000
# ============================================
# REDIS EMBEDDED (usa Testcontainers o mock)
# Para tests unitarios usamos mocks
# ============================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
# ============================================
# DESACTIVAR AUTOCONFIGURACION DE REDIS EN TESTS
# ============================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.cloud.gateway=WARN
logging.level.reactor.netty=WARN
logging.level.com.gamelisto.api_gateway=DEBUG
