# ============================================
# CONFIGURACI?N DOCKER - API GATEWAY
# ============================================
spring.application.name=api-gateway
server.port=8090
# ============================================
# JWT (debe coincidir con usuarios-service)
# ============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000
# ============================================
# REDIS (usa el nombre del servicio en Docker)
# ============================================
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
# ============================================
# RUTAS - En Docker los servicios se comunican por nombre del contenedor
# ============================================
# Rutas p?blicas - usuarios-service
spring.cloud.gateway.routes[0].id=usuarios-public
spring.cloud.gateway.routes[0].uri=http://usuarios-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/v1/usuarios/auth/login,/v1/usuarios/auth/refresh,/v1/usuarios/registro,/v1/usuarios/verificar-email,/v1/usuarios/reenviar-verificacion,/v1/usuarios/restablecer-contrasena
spring.cloud.gateway.routes[0].predicates[1]=Method=POST
# Rutas protegidas - usuarios-service
spring.cloud.gateway.routes[1].id=usuarios-protected
spring.cloud.gateway.routes[1].uri=http://usuarios-service:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/v1/usuarios/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/v1/usuarios/(?<segment>.*), /v1/usuarios/${segment}
# ============================================
# CORS
# ============================================
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:3000,http://localhost:5173
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.corsConfigurations.[/**].maxAge=3600
# ============================================
# ACTUATOR
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty=INFO
logging.level.com.gamelisto.api_gateway=INFO
