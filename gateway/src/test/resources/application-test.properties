# Evita ruido en test
spring.main.banner-mode=off
logging.level.root=warn
# (Opcional) acelera/contexto mas permisivo si tienes Spring tests
spring.main.lazy-initialization=true
# Si en tu app usas ${JWT_SECRET}, esto lo satisface en tests:
jwt.secret=test-secret-for-tests-please-change-32chars-minimum
# Redis (si alg·n bean lo requiere en init)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
# Evitar choque de puertos
server.port=0
# Ruta dummy interna para que Gateway tenga al menos una route sin llamar a otros servicios
spring.cloud.gateway.server.webflux.routes[0].id=ping
spring.cloud.gateway.server.webflux.routes[0].uri=forward:/actuator/health
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/ping
spring.cloud.gateway.server.webflux.routes[0].filters[0]=SetPath=/actuator/health
# CORS tambiķn en test (opcional)
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true