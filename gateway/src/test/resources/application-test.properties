# src/test/resources/application-test.properties
# Evita ruido en test
spring.main.banner-mode=off
logging.level.root=warn
# (Opcional) acelera/contexto más ?permisivo? si tienes Spring tests
spring.main.lazy-initialization=true
# --- Placeholders típicos que suelen romper el arranque si faltan ---
# Si en tu app usas ${JWT_SECRET}, esto lo satisface en tests:
JWT_SECRET=test-secret-for-tests-please-change
# Si tu gateway tiene cosas de redis por rate-limit/revocation y algún test levanta contexto:
REDIS_HOST=localhost
REDIS_PORT=6379
# --- (Opcional) Si mantienes @SpringBootTest y quieres que no dependa de nada externo ---
server.port=0
# Ruta ?dummy? interna para que Gateway tenga al menos una route sin llamar a otros servicios
spring.cloud.gateway.server.webflux.routes[0].id=ping
spring.cloud.gateway.server.webflux.routes[0].uri=forward:/actuator/health
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/ping
spring.cloud.gateway.server.webflux.routes[0].filters[0]=SetPath=/actuator/health