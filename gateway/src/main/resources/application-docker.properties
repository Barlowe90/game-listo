# ============================================
# CONFIGURACION DOCKER - API GATEWAY
# ============================================
spring.application.name=gateway
server.port=8080
# ============================================
# JWT (debe coincidir con usuarios)
# ============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000
# ============================================
# REDIS (usa el nombre del servicio en Docker)
# ============================================
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
# ============================================
# SWAGGER / OPENAPI (AGREGADO EN GATEWAY)
# ============================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.urls[0].name=Usuarios
springdoc.swagger-ui.urls[0].url=/openapi/usuarios
springdoc.swagger-ui.urls[1].name=Catalogo
springdoc.swagger-ui.urls[1].url=/openapi/catalogo
springdoc.swagger-ui.urls[2].name=Biblioteca
springdoc.swagger-ui.urls[2].url=/openapi/biblioteca
springdoc.swagger-ui.urls-primary-name=Usuarios
# ============================================
# ROUTES
# ============================================
services.usuarios.uri=http://usuarios:8081
services.catalogo.uri=http://catalogo:8082
services.biblioteca.uri=http://biblioteca:8083
# ============================================
# ROUTES
# ============================================
spring.cloud.gateway.server.webflux.routes[0].id=usuarios-public
spring.cloud.gateway.server.webflux.routes[0].uri=${services.usuarios.uri}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/v1/usuarios/auth/register,/v1/usuarios/auth/login,/v1/usuarios/auth/refresh,/v1/usuarios/auth/verify-email,/v1/usuarios/auth/resend-verification,/v1/usuarios/auth/forgot-password,/v1/usuarios/auth/reset-password
spring.cloud.gateway.server.webflux.routes[0].predicates[1]=Method=POST,GET,OPTIONS
# ============================================
spring.cloud.gateway.server.webflux.routes[1].id=usuarios-protected
spring.cloud.gateway.server.webflux.routes[1].uri=${services.usuarios.uri}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/v1/usuarios/**
# ============================================
spring.cloud.gateway.server.webflux.routes[2].id=catalogo-public
spring.cloud.gateway.server.webflux.routes[2].uri=${services.catalogo.uri}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/v1/catalogo/**
spring.cloud.gateway.server.webflux.routes[2].predicates[1]=Method=GET,POST,PUT,DELETE,PATCH,OPTIONS
# ============================================
spring.cloud.gateway.server.webflux.routes[3].id=biblioteca
spring.cloud.gateway.server.webflux.routes[3].uri=${services.biblioteca.uri}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/v1/biblioteca/**
spring.cloud.gateway.server.webflux.routes[3].predicates[1]=Method=GET,POST,PUT,PATCH,DELETE,OPTIONS
# ============================================
# CORS
# ============================================
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedOrigins=http://localhost:3000,http://localhost:5173
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowCredentials=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].maxAge=3600
# ============================================
# ACTUATOR
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty=INFO
logging.level.com.gamelisto.gateway=INFO
