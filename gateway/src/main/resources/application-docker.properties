# ============================================
# CONFIGURACION DOCKER - API GATEWAY
# ============================================
spring.application.name=gateway
server.port=8090
# ============================================
# JWT (debe coincidir con usuarios-service)
# ============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000
# ============================================
# REDIS (usa el nombre del servicio en Docker)
# ============================================
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
# ============================================
# CONFIGURACION DE RUTAS A MICROSERVICIOS
# ============================================
# Rutas publicas - usuarios-service (AuthController)
spring.cloud.gateway.server.webflux.routes[0].id=usuarios-public
spring.cloud.gateway.server.webflux.routes[0].uri=http://usuarios-service:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/v1/usuarios/auth/register,/v1/usuarios/auth/login,/v1/usuarios/auth/refresh,/v1/usuarios/auth/verify-email,/v1/usuarios/auth/resend-verification,/v1/usuarios/auth/forgot-password,/v1/usuarios/auth/reset-password,/v1/usuarios/health
spring.cloud.gateway.server.webflux.routes[0].predicates[1]=Method=POST,GET
# Rutas protegidas
# usuarios-service (requieren JWT)
spring.cloud.gateway.server.webflux.routes[1].id=usuarios-protected
spring.cloud.gateway.server.webflux.routes[1].uri=http://usuarios-service:8081
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/v1/usuarios/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=RewritePath=/v1/usuarios/(?<segment>.*), /v1/usuarios/${segment}
# catalogo-service
spring.cloud.gateway.server.webflux.routes[2].id=catalogo-public
spring.cloud.gateway.server.webflux.routes[2].uri=http://catalogo-service:8082
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/v1/catalogo/**,/v1/catalogo/health
spring.cloud.gateway.server.webflux.routes[2].predicates[1]=Method=GET,POST
# ============================================
# CORS
# ============================================
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedOrigins=http://localhost:3000,http://localhost:5173
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowCredentials=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].maxAge=3600
# ============================================
# ACTUATOR
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty=INFO
logging.level.com.gamelisto.gateway=INFO
