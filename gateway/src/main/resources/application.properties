# ============================================
# CONFIGURACION API GATEWAY - SPRING CLOUD GATEWAY
# ============================================
spring.application.name=gateway
server.port=8090
# ============================================
# CONFIGURACION JWT (debe coincidir con usuarios-service)
# ============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000
# ============================================
# CONFIGURACION REDIS (rate limiting + token revocation)
# ============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
# ============================================
# CONFIGURACION DE RUTAS A MICROSERVICIOS
# ============================================
# Rutas publicas (no requieren autenticacion)
# usuarios-service: AuthController - registro, login, verificacion, recuperacion
spring.cloud.gateway.routes[0].id=usuarios-public
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/v1/usuarios/auth/register,/v1/usuarios/auth/login,/v1/usuarios/auth/refresh,/v1/usuarios/auth/verify-email,/v1/usuarios/auth/resend-verification,/v1/usuarios/auth/forgot-password,/v1/usuarios/auth/reset-password,/v1/usuarios/health
spring.cloud.gateway.routes[0].predicates[1]=Method=POST,GET
# Rutas protegidas
# usuarios-service (requieren JWT)
spring.cloud.gateway.routes[1].id=usuarios-protected
spring.cloud.gateway.routes[1].uri=http://localhost:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/v1/usuarios/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/v1/usuarios/(?<segment>.*), /v1/usuarios/${segment}
# catalogo-service
spring.cloud.gateway.routes[2].id=catalogo-public
spring.cloud.gateway.routes[2].uri=http://localhost:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/v1/catalogo/**,/v1/catalogo/health
spring.cloud.gateway.routes[2].predicates[1]=Method=GET,POST
