# ============================================
# API GATEWAY - SPRING CLOUD GATEWAY (LOCAL)
# ============================================
spring.application.name=gateway
server.port=8090
# ============================================
# CONFIGURACION JWT (debe coincidir con usuarios-service)
# ============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000
# ============================================
# CONFIGURACION REDIS (rate limiting + token revocation)
# ============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
# ============================================
# URLS DE MICROSERVICIOS (LOCAL)
# ============================================
#services.usuarios.uri=http://localhost:8081
#services.catalogo.uri=http://localhost:8082
# ============================================
# ROUTES
# ============================================
spring.cloud.gateway.server.webflux.routes[0].id=usuarios-public
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/v1/usuarios/auth/register,/v1/usuarios/auth/login,/v1/usuarios/auth/refresh,/v1/usuarios/auth/verify-email,/v1/usuarios/auth/resend-verification,/v1/usuarios/auth/forgot-password,/v1/usuarios/auth/reset-password,/v1/usuarios/health
spring.cloud.gateway.server.webflux.routes[0].predicates[1]=Method=POST,GET,OPTIONS
# ============================================
spring.cloud.gateway.server.webflux.routes[1].id=usuarios-protected
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/v1/usuarios/**
# ============================================
spring.cloud.gateway.server.webflux.routes[2].id=catalogo-public
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/v1/catalogo/**
spring.cloud.gateway.server.webflux.routes[2].predicates[1]=Method=GET,POST,PUT,DELETE,PATCH,OPTIONS
# ============================================
# CONFIGURACION CORS
# ============================================
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedOrigins=http://localhost:3000,http://localhost:5173
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowCredentials=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].maxAge=3600
# ============================================
# ACTUATOR
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=INFO
logging.level.com.gamelisto.gateway=DEBUG